name: dirnbauer/innesto
label: 'Innesto'
dependencies:
  - webconsulting/desiderio
# Content Blocks exposes every content block as a virtual site set named after
# the block. Sites that restrict elements per set (Desiderio does) only show
# blocks listed here — innesto:add appends new grafts automatically.
optionalDependencies:
  - innesto/marquee
  - innesto/orbiting-circles
  - innesto/case-studies
  - innesto/stats-trending
  - innesto/stats-borders
  - innesto/stats-cards
  - innesto/stats-badges
  - innesto/stats-links
  - innesto/stats-status
  - innesto/stats-circular-progress
  - innesto/stats-circular-links
  - innesto/stats-progress
  - innesto/stats-area-chart
  - innesto/stats-dashboard
  - innesto/stats-usage-dashboard
  - innesto/stats-segmented-progress
  - innesto/stats-usage-breakdown
  - innesto/stats-value-breakdown
