name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    name: Lint & audit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # ext-yaml lets the audit parse config.yaml without composer install —
          # the extension cannot install standalone (webconsulting/desiderio is
          # provided by the consuming TYPO3 project, not Packagist).
          extensions: yaml, dom, mbstring
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-lock

      - name: PHP lint
        run: find Classes Configuration scripts -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Content-element contract audit
        run: php scripts/audit-content-elements.php
