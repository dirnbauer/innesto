<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="innesto-stats-badges" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section spacing="md" class="innesto-stats-badges-section">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="innesto-stats-badges__intro">
                <f:if condition="{data.eyebrow}">
                    <p class="innesto-stats-badges__eyebrow">{data -> f:render.text(field: 'eyebrow')}</p>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="innesto-stats-badges__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
            </header>
        </f:if>

        <dl class="innesto-stats-badges">
            <f:for each="{data.stats_badges_items}" as="entry">
                <div class="innesto-stats-badges__card">
                    <div class="innesto-stats-badges__row">
                        <dt class="innesto-stats-badges__title">{entry.title}</dt>
                        <f:if condition="{entry.badge_text}">
                            <span class="innesto-stats-badges__badge {f:if(condition: '{entry.badge_tone} == \'down\'', then: 'innesto-stats-badges__badge--down', else: 'innesto-stats-badges__badge--up')}">
                                <f:if condition="{entry.badge_tone} == 'down'">
                                    <f:then>
                                        <svg class="innesto-stats-badges__badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 17h6v-6"/><path d="m22 17-8.5-8.5-5 5L2 7"/></svg>
                                        <span class="innesto-stats-badges__sr-only">Decreased by </span>
                                    </f:then>
                                    <f:else>
                                        <svg class="innesto-stats-badges__badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/></svg>
                                        <span class="innesto-stats-badges__sr-only">Increased by </span>
                                    </f:else>
                                </f:if>
                                {entry.badge_text}
                            </span>
                        </f:if>
                    </div>
                    <dd class="innesto-stats-badges__value">{entry.value}</dd>
                </div>
            </f:for>
        </dl>
    </d:layout.container>
</d:layout.section>

</html>
