<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="innesto-stats-borders" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section spacing="md" class="innesto-stats-borders-section">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="innesto-stats-borders__intro">
                <f:if condition="{data.eyebrow}">
                    <p class="innesto-stats-borders__eyebrow">{data -> f:render.text(field: 'eyebrow')}</p>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="innesto-stats-borders__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
            </header>
        </f:if>

        <f:if condition="{data.stats_borders_items}">
            <dl class="innesto-stats-borders">
                <f:for each="{data.stats_borders_items}" as="entry" iteration="iterator">
                    <div class="innesto-stats-borders__cell">
                        <dt class="innesto-stats-borders__metric">{entry.title}</dt>
                        <dd class="innesto-stats-borders__row">
                            <span class="innesto-stats-borders__value">
                                {entry.value}
                                <f:if condition="{entry.previous}">
                                    <span class="innesto-stats-borders__previous">{entry.previous}</span>
                                </f:if>
                            </span>
                            <f:if condition="{entry.difference}">
                                <span class="innesto-stats-borders__badge {f:if(condition: '{entry.trend} == \'down\'', then: 'innesto-stats-borders__badge--down', else: 'innesto-stats-borders__badge--up')}">
                                    <f:if condition="{entry.trend} == 'down'">
                                        <f:then>
                                            <svg class="innesto-stats-borders__trend-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 17h6v-6"/><path d="m22 17-8.5-8.5-5 5L2 7"/></svg>
                                        </f:then>
                                        <f:else>
                                            <svg class="innesto-stats-borders__trend-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/></svg>
                                        </f:else>
                                    </f:if>
                                    <span>{entry.difference}</span>
                                </span>
                            </f:if>
                        </dd>
                    </div>
                </f:for>
            </dl>
        </f:if>
    </d:layout.container>
</d:layout.section>

</html>
