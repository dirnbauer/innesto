<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="innesto-stats-circular-progress" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section spacing="md" class="innesto-stats-circular-progress-section">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header} || {data.intro} || {data.link}">
            <header class="innesto-stats-circular-progress__intro">
                <f:if condition="{data.eyebrow}">
                    <p class="innesto-stats-circular-progress__eyebrow">{data -> f:render.text(field: 'eyebrow')}</p>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="innesto-stats-circular-progress__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
                <f:if condition="{data.intro} || {data.link}">
                    <p class="innesto-stats-circular-progress__lead">
                        <f:if condition="{data.intro}">{data.intro}</f:if>
                        <f:if condition="{data.link}">
                            <f:link.typolink parameter="{data.link}" class="innesto-stats-circular-progress__link">
                                {f:if(condition: data.link_text, then: data.link_text, else: 'Learn more')}
                                <svg class="innesto-stats-circular-progress__link-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
                            </f:link.typolink>
                        </f:if>
                    </p>
                </f:if>
            </header>
        </f:if>

        <f:if condition="{data.stats_circular_progress_items}">
            <dl class="innesto-stats-circular-progress">
                <f:for each="{data.stats_circular_progress_items}" as="entry" iteration="iterator">
                    <div class="innesto-stats-circular-progress__card">
                        <div class="innesto-stats-circular-progress__ring" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="{entry.percent}" aria-label="{entry.title}" style="--value: {entry.percent};">
                            <svg class="innesto-stats-circular-progress__chart" viewBox="0 0 80 80" aria-hidden="true">
                                <circle class="innesto-stats-circular-progress__track" cx="40" cy="40" r="34" pathLength="100"/>
                                <circle class="innesto-stats-circular-progress__fill" cx="40" cy="40" r="34" pathLength="100"/>
                            </svg>
                            <span class="innesto-stats-circular-progress__percent">{entry.percent}&#37;</span>
                        </div>
                        <div class="innesto-stats-circular-progress__body">
                            <dt class="innesto-stats-circular-progress__title">{entry.title}</dt>
                            <f:if condition="{entry.description}">
                                <dd class="innesto-stats-circular-progress__description">{entry.description}</dd>
                            </f:if>
                        </div>
                    </div>
                </f:for>
            </dl>
        </f:if>
    </d:layout.container>
</d:layout.section>

</html>
