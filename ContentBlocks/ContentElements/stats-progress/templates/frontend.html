<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="innesto-stats-progress" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section spacing="md" class="innesto-stats-progress-section">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="innesto-stats-progress__intro">
                <f:if condition="{data.eyebrow}">
                    <p class="innesto-stats-progress__eyebrow">{data -> f:render.text(field: 'eyebrow')}</p>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="innesto-stats-progress__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
            </header>
        </f:if>

        <f:if condition="{data.stats_progress_items}">
            <dl class="innesto-stats-progress">
                <f:for each="{data.stats_progress_items}" as="entry" iteration="iterator">
                    <div class="innesto-stats-progress__card">
                        <dt class="innesto-stats-progress__title">{entry.title}</dt>
                        <dd class="innesto-stats-progress__value">{entry.value}</dd>
                        <dd class="innesto-stats-progress__bar">
                            <div class="innesto-stats-progress__track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="{entry.percent}" aria-label="{entry.title}" style="--value: {entry.percent};">
                                <div class="innesto-stats-progress__fill"></div>
                            </div>
                        </dd>
                        <dd class="innesto-stats-progress__meta">
                            <span class="innesto-stats-progress__percent">{entry.percent}&#37;</span>
                            <f:if condition="{entry.limit}">
                                <span class="innesto-stats-progress__limit">{entry.value} of {entry.limit}</span>
                            </f:if>
                        </dd>
                    </div>
                </f:for>
            </dl>
        </f:if>
    </d:layout.container>
</d:layout.section>

</html>
