<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      xmlns:d="http://typo3.org/ns/Webconsulting/Desiderio/Components/ComponentCollection"
      data-namespace-typo3-fluid="true">

<f:asset.css identifier="innesto-stats-dashboard" href="{cb:assetPath()}/frontend.css"/>

<d:layout.section spacing="md" class="innesto-stats-dashboard-section">
    <d:layout.container>
        <f:if condition="{data.eyebrow} || {data.header}">
            <header class="innesto-stats-dashboard__intro">
                <f:if condition="{data.eyebrow}">
                    <p class="innesto-stats-dashboard__eyebrow">{data -> f:render.text(field: 'eyebrow')}</p>
                </f:if>
                <f:if condition="{data.header}">
                    <h2 class="innesto-stats-dashboard__headline">{data -> f:render.text(field: 'header')}</h2>
                </f:if>
            </header>
        </f:if>

        <f:if condition="{data.stats_dashboard_metrics}">
            <dl class="innesto-stats-dashboard">
                <f:for each="{data.stats_dashboard_metrics}" as="entry" iteration="iterator">
                    <div class="innesto-stats-dashboard__metric innesto-stats-dashboard__metric--{entry.tone}">
                        <dt class="innesto-stats-dashboard__title">{entry.title}</dt>
                        <dd class="innesto-stats-dashboard__reading">
                            <span class="innesto-stats-dashboard__value">{entry.value}</span>
                            <f:if condition="{entry.target}">
                                <span class="innesto-stats-dashboard__target">/ {entry.target}</span>
                            </f:if>
                        </dd>
                        <dd class="innesto-stats-dashboard__bar">
                            <div class="innesto-stats-dashboard__track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="{entry.percent}" aria-label="{entry.title}" style="--value: {entry.percent};">
                                <div class="innesto-stats-dashboard__fill"></div>
                            </div>
                        </dd>
                        <f:if condition="{entry.subtext}">
                            <dd class="innesto-stats-dashboard__subtext">{entry.subtext}</dd>
                        </f:if>
                    </div>
                </f:for>
            </dl>
        </f:if>
    </d:layout.container>
</d:layout.section>

</html>
